<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Calculadora</title>

  <style>
    #historico {
      height: 20px;
      color: gray;
      font-size: 14px;
    }

    #display {
      font-size: 20px;
      width: 200px;
    }
  </style>
</head>

<body>

  <div id="historico"></div>
  <input id="display" type="text" placeholder="0">

  <br>

  <!-- Teclado HTML -->
  <button onclick="limpar()">C</button>
  <br>

  <button onclick="inserirNumero('7')">7</button>
  <button onclick="inserirNumero('8')">8</button>
  <button onclick="inserirNumero('9')">9</button>
  <button onclick="inserirOperador('/')">/</button>
  <br>

  <button onclick="inserirNumero('4')">4</button>
  <button onclick="inserirNumero('5')">5</button>
  <button onclick="inserirNumero('6')">6</button>
  <button onclick="inserirOperador('*')">*</button>
  <br>

  <button onclick="inserirNumero('1')">1</button>
  <button onclick="inserirNumero('2')">2</button>
  <button onclick="inserirNumero('3')">3</button>
  <button onclick="inserirOperador('+')">+</button>

  <br>
  <button onclick="inserirNumero('0')">0</button>
  <button onclick="inserirPonto()">.</button>
  <button onclick="calcular()">=</button>
  <button onclick="inserirOperador('-')">-</button>

  <br>
  <br>

  <h3>Testes</h3>
  <ul id="testes"></ul>

  <button onclick="testarTodosOperadores()">Rodar testes</button>

  <script>
    let valorAnterior = null;
    let operadorAtual = null;

    const display = document.getElementById("display");
    const historico = document.getElementById("historico");

    // ======== FUNÇÕES DOS BOTÕES ========

    function inserirNumero(num) {
      display.value += num;
    }

    function inserirPonto() {
      // impede mais de um ponto no mesmo número
      if (display.value.includes(".")) return;

      // se estiver vazio, começa com 0.
      if (display.value === "") {
        display.value = "0.";
      } else {
        display.value += ".";
      }
    }

    function inserirOperador(op) {
      // Permite número negativo
      if (op === "-" && display.value === "" && valorAnterior === null) {
        display.value = "-";
        return;
      }

      if (display.value === "") return;

      if (valorAnterior !== null) {
        calcular();
      }

      valorAnterior = parseFloat(display.value);
      operadorAtual = op;

      historico.innerText = `${valorAnterior} ${operadorAtual}`;
      display.value = "";
    }

    function calcular() {
      if (valorAnterior === null || operadorAtual === null || display.value === "") {
        return;
      }

      const valorAtual = parseFloat(display.value);
      let resultado;

      switch (operadorAtual) {
        case "+": resultado = valorAnterior + valorAtual; break;
        case "-": resultado = valorAnterior - valorAtual; break;
        case "*": resultado = valorAnterior * valorAtual; break;
        case "/": resultado = valorAtual !== 0 ? valorAnterior / valorAtual : "Erro"; break;
      }

      historico.innerText = `${valorAnterior} ${operadorAtual} ${valorAtual} =`;
      display.value = resultado;

      valorAnterior = null;
      operadorAtual = null;
    }

    function limpar() {
      display.value = "";
      historico.innerText = "";
      valorAnterior = null;
      operadorAtual = null;
    }

    // ======== TECLADO ========

    document.addEventListener("keydown", (e) => {
      const operadores = ["+", "-", "*", "/"];

      // Números
      if (!isNaN(e.key)) {
        e.preventDefault();            // ⛔ impede duplicação
        inserirNumero(e.key);
      }

      // Operadores
      if (operadores.includes(e.key)) {
        e.preventDefault();            // ⛔ impede duplicação
        inserirOperador(e.key);
      }
      //ponto
      if (e.key === "..") {
        e.preventDefault();
        inserirPonto();
      }
      if (e.key === "=" || e.key === "Enter") {
        e.preventDefault();
        calcular();
      }

      if (e.key === "Escape") {
        limpar();
      }
    });

    //testes
    const listaTestes = document.getElementById("testes");

    function executarTesteHTML(nome, esperado, executar) {
      limpar();
      executar();

      const obtido = display.value;
      const li = document.createElement("li");

      if (obtido == esperado) {
        li.textContent = `${nome} | esperado: ${esperado} | obtido: ${obtido}`;
      } else {
        li.textContent = `${nome} | esperado: ${esperado} | obtido: ${obtido}`;
      }

      listaTestes.appendChild(li);
    }


    function testarTodosOperadores() {
      listaTestes.innerHTML = ""; // limpa testes antigos

      executarTesteHTML("Soma 8 + 2", 10, () => {
        inserirNumero("8");
        inserirOperador("+");
        inserirNumero("2");
        calcular();
      });

      executarTesteHTML("Subtração 9 - 4", 5, () => {
        inserirNumero("9");
        inserirOperador("-");
        inserirNumero("4");
        calcular();
      });

      executarTesteHTML("Multiplicação 6 * 7", 42, () => {
        inserirNumero("6");
        inserirOperador("*");
        inserirNumero("7");
        calcular();
      });

      executarTesteHTML("Divisão 20 / 5", 4, () => {
        inserirNumero("20");
        inserirOperador("/");
        inserirNumero("5");
        calcular();
      });

      executarTesteHTML("Divisão por zero", "Erro", () => {
        inserirNumero("10");
        inserirOperador("/");
        inserirNumero("0");
        calcular();
      });

      executarTesteHTML("Decimal 1.5 + 2.3", 3.8, () => {
        inserirNumero("1");
        inserirPonto();
        inserirNumero("5");
        inserirOperador("+");
        inserirNumero("2");
        inserirPonto();
        inserirNumero("3");
        calcular();
      });
    }


  </script>

</body>

</html>
